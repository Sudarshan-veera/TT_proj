project:
  title: "Tiny Anomaly Detection Engine"
  author: "Sudarshan"
  description: "Sliding window anomaly detector with adaptive threshold. ui_in=8-bit sensor data. uio_in[7]=hold_mode uio_in[6:5]=sensitivity(00=50pct 01=25pct 10=12.5pct 11=6.25pct) uio_in[4]=nshot_mode(0=one-shot 1=n-shot) uio_in[3:0]=anomaly_limit(0-15). uo_out[0]=ALERT uo_out[1]=READY uo_out[2]=LOCKED uo_out[7:3]=mean_hi."
  language: "Verilog"
  clock_hz: 10000000
  tiles: "1x1"
  top_module: "tt_um_anomaly_detector"

source_files:
  - "project.v"

pinout:
  ui[0]: "sensor_data[0]"
  ui[1]: "sensor_data[1]"
  ui[2]: "sensor_data[2]"
  ui[3]: "sensor_data[3]"
  ui[4]: "sensor_data[4]"
  ui[5]: "sensor_data[5]"
  ui[6]: "sensor_data[6]"
  ui[7]: "sensor_data[7]"

  uo[0]: "ALERT"
  uo[1]: "READY"
  uo[2]: "LOCKED"
  uo[3]: "mean[3]"
  uo[4]: "mean[4]"
  uo[5]: "mean[5]"
  uo[6]: "mean[6]"
  uo[7]: "mean[7]"

  uio[0]: "anomaly_limit[0]"
  uio[1]: "anomaly_limit[1]"
  uio[2]: "anomaly_limit[2]"
  uio[3]: "anomaly_limit[3]"
  uio[4]: "nshot_mode"
  uio[5]: "sensitivity[0]"
  uio[6]: "sensitivity[1]"
  uio[7]: "hold_mode"

yaml_version: 6
